version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=progress_db
      - DB_USER=root
      - DB_PASS=root_password
    depends_on:
      - db

  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: progress_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/www/mysql

volumes:
  db_data:
